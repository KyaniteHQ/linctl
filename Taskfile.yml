version: "3"

vars:
  BINARY: linctl
  PKG: ./cmd/linctl
  GOLANGCI_LINT: github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

tasks:
  default:
    deps: [ci]

  fmt:
    desc: Format Go files
    cmds:
      - go tool gofumpt -w cmd internal scripts
      - go tool goimports -w -local "$(go list -m)" cmd internal scripts

  lint:
    desc: Run linters
    cmds:
      - go run {{.GOLANGCI_LINT}} run --timeout 5m $(bash scripts/go-packages.sh)

  vuln:
    desc: Run vulnerability checks
    cmds:
      - go tool govulncheck $(bash scripts/go-packages.sh)

  gen-skill:
    desc: Regenerate the linctl agent command reference from the command tree
    cmds:
      - go run scripts/gen-skill.go

  generate-check:
    desc: Regenerate the GraphQL client and command reference and verify they are committed
    cmds:
      - go generate ./...
      - git diff --exit-code -- internal/client/generated.go
      - task: gen-skill
      - git diff --exit-code -- skills/linctl/references/commands.md
      - go run scripts/linear_api_coverage*.go -h >/dev/null
      - task: coverage-ledger-check

  coverage-ledger-check:
    desc: Verify the generated Linear API coverage ledger against the upstream SDK checkout
    cmds:
      - |
        upstream="${LINCTL_LINEAR_SDK_UPSTREAM:-/tmp/linctl-upstream-linear}"
        remote="https://github.com/linear/linear.git"
        branch="master"
        if [[ ! -e "$upstream" ]]; then
          git clone --depth=1 --branch "$branch" "$remote" "$upstream"
        elif [[ ! -d "$upstream/.git" ]]; then
          printf 'coverage ledger upstream path exists but is not a git checkout: %s\n' "$upstream" >&2
          printf 'Set LINCTL_LINEAR_SDK_UPSTREAM to a Linear repo checkout or remove the path.\n' >&2
          exit 1
        else
          origin="$(git -C "$upstream" remote get-url origin 2>/dev/null || true)"
          if [[ "$origin" != "$remote" ]]; then
            printf 'coverage ledger upstream checkout has unexpected origin: %s\n' "$origin" >&2
            printf 'Expected %s. Set LINCTL_LINEAR_SDK_UPSTREAM to a Linear repo checkout or remove the path.\n' "$remote" >&2
            exit 1
          fi
          git -C "$upstream" fetch --depth=1 origin "$branch"
          git -C "$upstream" checkout --detach FETCH_HEAD
        fi
        tmp="$(mktemp)"
        trap 'rm -f "$tmp"' EXIT
        go run scripts/linear_api_coverage*.go --upstream "$upstream" --output "$tmp"
        diff -u docs/linear-api-coverage.md "$tmp"

  domain-language-check:
    desc: Verify user-facing docs and help avoid workspace terminology
    cmds:
      - bash scripts/domain-language-check.sh

  test:
    desc: Run tests
    cmds:
      - go test -race -shuffle=on -count=1 $(bash scripts/go-packages.sh)

  coverage:
    desc: Run statement coverage for hand-written code
    cmds:
      - bash scripts/coverage.sh

  live-smoke:
    desc: Run opt-in live smoke tests against disposable Linear resources
    cmds:
      - bash scripts/live-smoke.sh

  vet:
    desc: Run go vet
    cmds:
      - go vet $(bash scripts/go-packages.sh)

  actionlint:
    desc: Lint GitHub Actions workflows (matches CI; needs shellcheck on PATH for shell checks)
    env:
      SHELLCHECK_OPTS: --exclude=SC2046
    cmds:
      - go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  build:
    desc: Build linctl
    cmds:
      - go build -trimpath -ldflags="-s -w" -o bin/{{.BINARY}} {{.PKG}}

  ci:
    desc: Run the local CI gate
    cmds:
      - task: generate-check
      - task: domain-language-check
      - task: vet
      - task: test
      - go build $(bash scripts/go-packages.sh)
      - task: lint
      - task: actionlint
      - task: vuln
