version: "3"

vars:
  BINARY: linctl
  PKG: ./cmd/linctl
  GOLANGCI_LINT: github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

tasks:
  default:
    deps: [ci]

  fmt:
    desc: Format Go files
    cmds:
      - gofumpt -w .
      - goimports -w -local "$(go list -m)" .

  lint:
    desc: Run linters
    cmds:
      - go run {{.GOLANGCI_LINT}} run --timeout 5m ./...

  generate-check:
    desc: Regenerate GraphQL client and verify it is committed
    cmds:
      - go generate ./...
      - git diff --exit-code -- internal/client/generated.go

  test:
    desc: Run tests
    cmds:
      - go test -race -shuffle=on -count=1 ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  build:
    desc: Build linctl
    cmds:
      - go build -trimpath -ldflags="-s -w" -o bin/{{.BINARY}} {{.PKG}}

  ci:
    desc: Run the local CI gate
    cmds:
      - task: generate-check
      - task: vet
      - task: test
      - go build ./...
      - task: lint
