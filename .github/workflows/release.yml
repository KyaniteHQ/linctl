name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify dependencies
        run: go mod download
      - name: Verify generated client
        run: |
          go generate ./...
          git diff --exit-code -- internal/client/generated.go
      - name: Vet
        run: go vet $(bash scripts/go-packages.sh)
      - name: Test
        run: go test -race -shuffle=on -count=1 $(bash scripts/go-packages.sh)
      - name: Build
        run: go build $(bash scripts/go-packages.sh)
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run --timeout 5m $(bash scripts/go-packages.sh)
      - name: Vulnerability scan
        run: go tool govulncheck $(bash scripts/go-packages.sh)
      - name: Verify GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: preflight
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
