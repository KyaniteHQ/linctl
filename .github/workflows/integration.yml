name: integration

# Live integration + e2e against a disposable Linear workspace. Token-gated:
# when LINCTL_TEST_TOKEN is not configured the job runs but skips the live
# steps, so forks and unconfigured repos stay green.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  live:
    name: integration + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'KyaniteHQ/linctl'
    env:
      LINCTL_TEST_TOKEN: ${{ secrets.LINCTL_TEST_TOKEN }}
      LINCTL_TEST_ORG_ID: ${{ secrets.LINCTL_TEST_ORG_ID }}
      LINCTL_TEST_TEAM_KEY: ${{ secrets.LINCTL_TEST_TEAM_KEY }}
      LINCTL_TEST_TEAM_ID: ${{ secrets.LINCTL_TEST_TEAM_ID }}
      LINCTL_TEST_PROJECT_ID: ${{ secrets.LINCTL_TEST_PROJECT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
      - name: Skip notice (token absent)
        if: env.LINCTL_TEST_TOKEN == ''
        run: echo "LINCTL_TEST_TOKEN not configured — skipping live integration + e2e." >> "$GITHUB_STEP_SUMMARY"
      - name: Integration tests
        if: env.LINCTL_TEST_TOKEN != ''
        run: go test -count=1 -tags=integration -timeout 120s ./internal/client
      - name: Live smoke (e2e)
        if: env.LINCTL_TEST_TOKEN != ''
        run: bash scripts/live-smoke.sh
