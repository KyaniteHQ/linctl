name: integration

# Live integration + e2e against a disposable Linear target. OAuth fixture-gated:
# when OAuth app material is not configured the job runs but skips the live
# steps, so forks and unconfigured repos stay green.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  live:
    name: integration + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'KyaniteHQ/linctl'
    env:
      LINCTL_TEST_ORG_ID: ${{ secrets.LINCTL_TEST_ORG_ID }}
      LINCTL_TEST_TEAM_KEY: ${{ secrets.LINCTL_TEST_TEAM_KEY }}
      LINCTL_TEST_TEAM_ID: ${{ secrets.LINCTL_TEST_TEAM_ID }}
      LINCTL_TEST_PROJECT_ID: ${{ secrets.LINCTL_TEST_PROJECT_ID }}
      LINCTL_OAUTH_CLIENT_ID: ${{ secrets.LINCTL_OAUTH_CLIENT_ID }}
      LINCTL_OAUTH_CLIENT_SECRET: ${{ secrets.LINCTL_OAUTH_CLIENT_SECRET }}
      LINCTL_OAUTH_REDIRECT_URI: ${{ secrets.LINCTL_OAUTH_REDIRECT_URI }}
      LINCTL_OAUTH_SCOPES: ${{ secrets.LINCTL_OAUTH_SCOPES }}
      LINCTL_OAUTH_EXPECTED_ACTOR: app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
      - name: Skip notice (OAuth fixture absent)
        if: env.LINCTL_OAUTH_CLIENT_ID == '' || env.LINCTL_OAUTH_CLIENT_SECRET == '' || env.LINCTL_OAUTH_REDIRECT_URI == '' || env.LINCTL_OAUTH_SCOPES == '' || env.LINCTL_TEST_ORG_ID == '' || env.LINCTL_TEST_TEAM_KEY == '' || env.LINCTL_TEST_TEAM_ID == ''
        run: echo "OAuth fixture env is not configured, skipping live integration + e2e." >> "$GITHUB_STEP_SUMMARY"
      - name: Write live target config
        if: env.LINCTL_OAUTH_CLIENT_ID != '' && env.LINCTL_OAUTH_CLIENT_SECRET != '' && env.LINCTL_OAUTH_REDIRECT_URI != '' && env.LINCTL_OAUTH_SCOPES != '' && env.LINCTL_TEST_ORG_ID != '' && env.LINCTL_TEST_TEAM_KEY != '' && env.LINCTL_TEST_TEAM_ID != ''
        run: |
          {
            printf '[target]\n'
            printf 'org_id = "%s"\n' "$LINCTL_TEST_ORG_ID"
            printf 'team_key = "%s"\n' "$LINCTL_TEST_TEAM_KEY"
            printf 'team_id = "%s"\n' "$LINCTL_TEST_TEAM_ID"
            printf 'project_id = "%s"\n' "$LINCTL_TEST_PROJECT_ID"
          } > .linctl.toml
      - name: OAuth live gate
        if: env.LINCTL_OAUTH_CLIENT_ID != '' && env.LINCTL_OAUTH_CLIENT_SECRET != '' && env.LINCTL_OAUTH_REDIRECT_URI != '' && env.LINCTL_OAUTH_SCOPES != '' && env.LINCTL_TEST_ORG_ID != '' && env.LINCTL_TEST_TEAM_KEY != '' && env.LINCTL_TEST_TEAM_ID != ''
        run: go tool task live-oauth
      - name: Integration tests
        if: env.LINCTL_OAUTH_CLIENT_ID != '' && env.LINCTL_OAUTH_CLIENT_SECRET != '' && env.LINCTL_OAUTH_REDIRECT_URI != '' && env.LINCTL_OAUTH_SCOPES != '' && env.LINCTL_TEST_ORG_ID != '' && env.LINCTL_TEST_TEAM_KEY != '' && env.LINCTL_TEST_TEAM_ID != ''
        run: go test -count=1 -tags=integration -timeout 120s ./internal/client
      - name: Live smoke (e2e)
        if: env.LINCTL_OAUTH_CLIENT_ID != '' && env.LINCTL_OAUTH_CLIENT_SECRET != '' && env.LINCTL_OAUTH_REDIRECT_URI != '' && env.LINCTL_OAUTH_SCOPES != '' && env.LINCTL_TEST_ORG_ID != '' && env.LINCTL_TEST_TEAM_KEY != '' && env.LINCTL_TEST_TEAM_ID != ''
        run: bash scripts/live-smoke.sh
