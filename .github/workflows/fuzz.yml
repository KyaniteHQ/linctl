name: fuzz

# The fuzz functions run their seed corpus under the normal test suite; this
# workflow actually fuzzes them on a short budget so they keep finding new
# inputs. A crash uploads the generated corpus so it can be committed under
# testdata/fuzz/<Func>/ as a permanent regression seed.
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  fuzz:
    name: fuzz / ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: FuzzRequireTargetMatch
            package: ./internal/client
          - target: FuzzProjectJSONFields
            package: ./internal/cli
          - target: FuzzSortByJSONField
            package: ./internal/cli
          - target: FuzzParseIssueIdentifier
            package: ./internal/gitctx
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
      - name: Fuzz ${{ matrix.target }}
        run: go test -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime 60s ${{ matrix.package }}
      - name: Upload crash corpus
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: ${{ matrix.package }}/testdata/fuzz/
          if-no-files-found: ignore
