name: ci

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  generated-client:
    name: generated client
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
      - name: Verify generated client
        run: |
          go generate ./...
          git diff --exit-code -- internal/client/generated.go
      - name: Verify generated command reference
        run: |
          go run scripts/gen-skill.go
          git diff --exit-code -- skills/linctl/references/commands.md
      - name: Verify GraphQL operations against upstream Linear schema
        run: go run github.com/go-task/task/v3/cmd/task@latest graphql-operation-check
      - name: Verify Linear API coverage ledger
        run: go run github.com/go-task/task/v3/cmd/task@latest coverage-ledger-check

  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            race: "-race"
          - os: macos-latest
            race: "-race"
          - os: windows-latest
            race: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
      - name: Vet
        run: go vet $(bash scripts/go-packages.sh)
      - name: Test
        run: go test ${{ matrix.race }} -shuffle=on -count=1 -timeout 180s $(bash scripts/go-packages.sh)
      - name: Build
        run: go build $(bash scripts/go-packages.sh)
      - name: Smoke run
        run: |
          bin="./linctl-bin$(go env GOEXE)"
          go build -o "$bin" ./cmd/linctl
          "$bin" --version
          "$bin" --help
          "$bin" usage
          "$bin" issue usage

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
      - name: Verify hand-written coverage
        run: bash scripts/coverage.sh

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          args: ./cmd/... ./internal/...
      - name: Shellcheck
        run: shellcheck scripts/*.sh
      - name: Domain language
        run: bash scripts/domain-language-check.sh
      - name: Actionlint
        # scripts/go-packages.sh emits a space-separated package list, so the
        # unquoted command substitution in the Go steps is intentional word
        # splitting — SC2046 does not apply here.
        env:
          SHELLCHECK_OPTS: --exclude=SC2046
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  security:
    name: security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
      - name: Vulnerability scan
        # Official reachability-aware scan, scoped to the product packages; the
        # scripts/ build-ignored generator and gitignored skill examples break a
        # bare ./... so the patterns mirror scripts/go-packages.sh. Local parity
        # stays via `task ci` (go tool govulncheck).
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod
          go-package: ./cmd/... ./internal/...

  live-oauth:
    name: live oauth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LINCTL_TEST_ORG_ID: ${{ secrets.LINCTL_TEST_ORG_ID }}
      LINCTL_TEST_TEAM_KEY: ${{ secrets.LINCTL_TEST_TEAM_KEY }}
      LINCTL_TEST_TEAM_ID: ${{ secrets.LINCTL_TEST_TEAM_ID }}
      LINCTL_TEST_PROJECT_ID: ${{ secrets.LINCTL_TEST_PROJECT_ID }}
      LINCTL_OAUTH_CLIENT_ID: ${{ secrets.LINCTL_OAUTH_CLIENT_ID }}
      LINCTL_OAUTH_CLIENT_SECRET: ${{ secrets.LINCTL_OAUTH_CLIENT_SECRET }}
      LINCTL_OAUTH_REDIRECT_URI: ${{ secrets.LINCTL_OAUTH_REDIRECT_URI }}
      LINCTL_OAUTH_SCOPES: ${{ secrets.LINCTL_OAUTH_SCOPES }}
      LINCTL_OAUTH_EXPECTED_ACTOR: app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
      - name: Skip notice (OAuth fixture absent)
        if: env.LINCTL_OAUTH_CLIENT_ID == '' || env.LINCTL_OAUTH_CLIENT_SECRET == '' || env.LINCTL_OAUTH_REDIRECT_URI == '' || env.LINCTL_OAUTH_SCOPES == '' || env.LINCTL_TEST_ORG_ID == '' || env.LINCTL_TEST_TEAM_KEY == '' || env.LINCTL_TEST_TEAM_ID == ''
        run: echo "OAuth fixture env is not configured, skipping live OAuth." >> "$GITHUB_STEP_SUMMARY"
      - name: Write live target config
        if: env.LINCTL_OAUTH_CLIENT_ID != '' && env.LINCTL_OAUTH_CLIENT_SECRET != '' && env.LINCTL_OAUTH_REDIRECT_URI != '' && env.LINCTL_OAUTH_SCOPES != '' && env.LINCTL_TEST_ORG_ID != '' && env.LINCTL_TEST_TEAM_KEY != '' && env.LINCTL_TEST_TEAM_ID != ''
        run: |
          {
            printf '[target]\n'
            printf 'org_id = "%s"\n' "$LINCTL_TEST_ORG_ID"
            printf 'team_key = "%s"\n' "$LINCTL_TEST_TEAM_KEY"
            printf 'team_id = "%s"\n' "$LINCTL_TEST_TEAM_ID"
            printf 'project_id = "%s"\n' "$LINCTL_TEST_PROJECT_ID"
          } > .linctl.toml
      - name: OAuth live gate
        if: env.LINCTL_OAUTH_CLIENT_ID != '' && env.LINCTL_OAUTH_CLIENT_SECRET != '' && env.LINCTL_OAUTH_REDIRECT_URI != '' && env.LINCTL_OAUTH_SCOPES != '' && env.LINCTL_TEST_ORG_ID != '' && env.LINCTL_TEST_TEAM_KEY != '' && env.LINCTL_TEST_TEAM_ID != ''
        run: go run github.com/go-task/task/v3/cmd/task@latest live-oauth

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  release-snapshot:
    name: release snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - generated-client
      - test
      - coverage
      - lint
      - security
      - live-oauth
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify release build
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --snapshot --clean --skip=sign,sbom
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
