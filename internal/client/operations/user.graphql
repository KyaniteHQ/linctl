}

fragment UserSummaryFields on User {
  id
  name
  displayName
  email
  active
  guest
  admin
}

fragment DraftSummaryFields on Draft {
  id
  createdAt
  updatedAt
  archivedAt
  issue {
    id
    identifier
    title
  }
  project {
    id
    name
  }
  projectUpdate {
    id
  }
  initiative {
    id
    name
  }
  initiativeUpdate {
    id
  }
  parentComment {
    id
  }
  customerNeed {
    id
  }
  team {
    id
    key
    name
  }
}

fragment UserSettingsSummaryFields on UserSettings {
  id
  createdAt
  updatedAt
  archivedAt
  autoAssignToSelf
  feedLastSeenTime
  feedSummarySchedule
  showFullUserNames
  subscribedToChangelog
  subscribedToDPA
  subscribedToInviteAccepted
  subscribedToPrivacyLegalUpdates
  user {
    id
  }
  notificationCategoryPreferences {
    ...NotificationCategoryPreferencesFields
  }
  notificationChannelPreferences {
    ...NotificationChannelPreferencesFields
  }
  notificationDeliveryPreferences {
    ...NotificationDeliveryPreferencesFields
  }
}

fragment NotificationCategoryPreferencesFields on NotificationCategoryPreferences {
  appsAndIntegrations {
    ...NotificationChannelPreferencesFields
