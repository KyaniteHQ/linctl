fragment UserSummaryFields on User {
  id
  name
  displayName
  email
  active
  guest
  admin
}

fragment DraftSummaryFields on Draft {
  id
  createdAt
  updatedAt
  archivedAt
  issue {
    id
    identifier
    title
  }
  project {
    id
    name
  }
  projectUpdate {
    id
  }
  initiative {
    id
    name
  }
  initiativeUpdate {
    id
  }
  parentComment {
    id
  }
  customerNeed {
    id
  }
  team {
    id
    key
    name
  }
}
