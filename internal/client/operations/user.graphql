query users($first: Int, $after: String, $includeArchived: Boolean, $includeDisabled: Boolean) {
  users(first: $first, after: $after, includeArchived: $includeArchived, includeDisabled: $includeDisabled) {
    nodes {
      ...UserSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query user($id: String!) {
  user(id: $id) {
    ...UserSummaryFields
  }
}

query viewer {
  viewer {
    ...UserSummaryFields
  }
}

query viewer_drafts($first: Int, $after: String, $includeArchived: Boolean) {
  viewer {
    drafts(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...DraftSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query user_assignedIssues($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  user(id: $id) {
    assignedIssues(first: $first, after: $after, includeArchived: $includeArchived) {
