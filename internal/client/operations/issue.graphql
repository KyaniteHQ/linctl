query issues($first: Int, $after: String, $includeArchived: Boolean) {
  issues(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...IssueSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query IssuesByTeam($teamId: ID!, $first: Int, $after: String, $includeArchived: Boolean) {
  issues(
    filter: { team: { id: { eq: $teamId } } }
    first: $first
    after: $after
    includeArchived: $includeArchived
  ) {
    nodes {
      ...IssueSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

