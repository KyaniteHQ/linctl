query NextIssuesByTeam($teamId: ID!, $first: Int, $after: String, $includeArchived: Boolean) {
  issues(
    filter: {
      team: { id: { eq: $teamId } }
      state: { type: { eq: "unstarted" } }
      hasBlockedByRelations: { eq: false }
    }
    first: $first
    after: $after
    includeArchived: $includeArchived
  ) {
    nodes {
      ...IssueSummaryFields
      createdAt
      relations(first: 10) {
        nodes {
          type
          relatedIssue {
            id
            state {
              type
            }
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query IssueBlockedIssues($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  issue(id: $id) {
    id
    identifier
    relations(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        id
        type
        relatedIssue {
          ...IssueSummaryFields
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query IssueDependencies($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  issue(id: $id) {
    id
    identifier
    parent {
      ...IssueSummaryFields
    }
    children(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...IssueSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
    relations(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        id
        type
        relatedIssue {
          ...IssueSummaryFields
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
    inverseRelations(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        id
        type
        issue {
          ...IssueSummaryFields
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query issueSearch($teamId: ID!, $query: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  issueSearch(
    filter: { team: { id: { eq: $teamId } }, searchableContent: { contains: $query } }
    query: $query
    first: $first
    after: $after
    includeArchived: $includeArchived
  ) {
    nodes {
      ...IssueSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query issue($id: String!) {
  issue(id: $id) {
    description
    ...IssueSummaryFields
    projectMilestone {
      id
      name
    }
  }
}

query issue_comments($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
