query attachments($first: Int, $after: String, $includeArchived: Boolean) {
  attachments(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...AttachmentSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query attachmentsForURL($url: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  attachmentsForURL(url: $url, first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...AttachmentSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query attachment($id: String!) {
  attachment(id: $id) {
    ...AttachmentSummaryFields
  }
}

query attachmentIssue($id: String!) {
  attachmentIssue(id: $id) {
    ...IssueSummaryFields
  }
}

query attachmentIssue_attachments($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  attachmentIssue(id: $id) {
    attachments(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...AttachmentSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query attachmentIssue_botActor($id: String!) {
  attachmentIssue(id: $id) {
    id
    botActor {
