query attachmentIssue_history($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  attachmentIssue(id: $id) {
    history(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        id
        actorId
        updatedDescription
        createdAt
        updatedAt
        archivedAt
        issue {
          id
