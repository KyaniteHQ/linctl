query workflowStates($first: Int, $after: String, $includeArchived: Boolean) {
  workflowStates(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...WorkflowStateSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query workflowState($id: String!) {
  workflowState(id: $id) {
    ...WorkflowStateSummaryFields
  }
}

query workflowState_issues($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  workflowState(id: $id) {
    id
    name
    issues(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...IssueSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

fragment WorkflowStateSummaryFields on WorkflowState {
  id
  name
  type
  color
  position
  team {
    id
    key
    name
  }
}
