query Documents($first: Int, $after: String, $includeArchived: Boolean) {
  documents(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...DocumentSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query document($id: String!) {
  document(id: $id) {
    ...DocumentSummaryFields
  }
}

query document_comments($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  document(id: $id) {
    id
    comments(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...CommentMetadataFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

mutation DocumentCreate($input: DocumentCreateInput!) {
  documentCreate(input: $input) {
    success
    document {
      ...DocumentSummaryFields
    }
  }
}

mutation DocumentUpdate($id: String!, $input: DocumentUpdateInput!) {
  documentUpdate(id: $id, input: $input) {
    success
    document {
      ...DocumentSummaryFields
    }
  }
}

fragment DocumentSummaryFields on Document {
  id
  title
  slugId
  archivedAt
  project {
    id
    name
  }
  team {
    id
    key
    name
  }
  issue {
    id
    identifier
    title
  }
  cycle {
    id
    number
    name
  }
}
