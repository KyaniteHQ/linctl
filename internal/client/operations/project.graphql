query Projects($teamId: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  team(id: $teamId) {
    projects(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...ProjectSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query projects($first: Int, $after: String, $includeArchived: Boolean) {
  projects(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...ProjectSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query project($id: String!) {
  project(id: $id) {
    ...ProjectSummaryFields
  }
}

query project_members($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  project(id: $id) {
    id
    name
    members(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        id
        name
        displayName
        email
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

