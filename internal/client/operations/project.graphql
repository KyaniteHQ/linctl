query projectFilterSuggestion($prompt: String!, $teamId: String) {
  projectFilterSuggestion(prompt: $prompt, teamId: $teamId) {
    filter
    logId
  }
}

fragment ProjectHistorySummaryFields on ProjectHistory {
  id
  createdAt
  updatedAt
  archivedAt
  entries
  project {
    id
  }
}

fragment ProjectAttachmentSummaryFields on ProjectAttachment {
  id
  title
  subtitle
  url
  sourceType
}

mutation ProjectCreate($input: ProjectCreateInput!) {
  projectCreate(input: $input) {
    success
    project {
      ...ProjectSummaryFields
    }
  }
}

mutation ProjectUpdate($id: String!, $input: ProjectUpdateInput!) {
  projectUpdate(id: $id, input: $input) {
    success
    project {
      ...ProjectSummaryFields
    }
  }
}

mutation ProjectArchive($id: String!, $trash: Boolean) {
  projectArchive(id: $id, trash: $trash) {
    success
    entity {
      ...ProjectSummaryFields
    }
  }
}
