query IssueLabels($first: Int, $after: String, $includeArchived: Boolean) {
  issueLabels(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...IssueLabelSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query issueLabel($id: String!) {
  issueLabel(id: $id) {
    ...IssueLabelSummaryFields
  }
}

query issueLabel_children($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  issueLabel(id: $id) {
    id
    name
    children(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...IssueLabelSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query issueLabel_issues($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  issueLabel(id: $id) {
    id
    name
    issues(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...IssueSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

fragment IssueLabelSummaryFields on IssueLabel {
  id
  name
  description
  color
  isGroup
  team {
    id
    key
    name
  }
}
