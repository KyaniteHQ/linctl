query customViews($first: Int, $after: String, $includeArchived: Boolean) {
  customViews(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...CustomViewSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query customView($id: String!) {
  customView(id: $id) {
    ...CustomViewSummaryFields
  }
}

query customViewHasSubscribers($id: String!) {
  customViewHasSubscribers(id: $id) {
    hasSubscribers
  }
}

query customView_initiatives($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  customView(id: $id) {
    initiatives(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...InitiativeSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query customView_organizationViewPreferences($id: String!) {
  customView(id: $id) {
    organizationViewPreferences {
      ...CustomViewPreferencesFields
    }
  }
}

query customView_organizationViewPreferences_preferences($id: String!) {
  customView(id: $id) {
    organizationViewPreferences {
      preferences {
        ...CustomViewPreferencesValueFields
      }
    }
  }
}

query customView_viewPreferencesValues($id: String!) {
  customView(id: $id) {
    viewPreferencesValues {
      ...CustomViewPreferencesValueFields
    }
  }
}

fragment CustomViewSummaryFields on CustomView {
  id
  name
  description
  modelName
  shared
  color
  slugId
}

fragment CustomViewPreferencesFields on ViewPreferences {
  id
  createdAt
  updatedAt
  archivedAt
  type
  viewType
  preferences {
    ...CustomViewPreferencesValueFields
  }
}

fragment CustomViewPreferencesValueFields on ViewPreferencesValues {
  layout
  viewOrdering
  viewOrderingDirection
  issueGrouping
  issueSubGrouping
  showCompletedIssues
  showArchivedItems
  showEmptyGroups
  hiddenColumns
  hiddenRows
  hiddenGroupsList
  columnOrderBoard
  columnOrderList
  projectLayout
  projectViewOrdering
  projectGrouping
  projectSubGrouping
  projectShowEmptyGroups
  projectShowEmptySubGroups
}
