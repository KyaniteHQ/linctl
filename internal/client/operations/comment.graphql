query comments($first: Int, $after: String, $includeArchived: Boolean) {
  comments(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...TopLevelCommentSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query comment($id: String, $hash: String) {
  comment(id: $id, hash: $hash) {
    ...TopLevelCommentSummaryFields
  }
}

mutation CommentUpdate($id: String!, $input: CommentUpdateInput!) {
  commentUpdate(id: $id, input: $input) {
    success
    comment {
      ...TopLevelCommentSummaryFields
    }
  }
}

mutation CommentDelete($id: String!) {
  commentDelete(id: $id) {
    success
    entityId
  }
}

query comment_botActor($id: String, $hash: String) {
  comment(id: $id, hash: $hash) {
    id
    botActor {
      ...ActorBotSummaryFields
    }
  }
}

query comment_children($id: String, $hash: String, $first: Int, $after: String, $includeArchived: Boolean) {
  comment(id: $id, hash: $hash) {
    id
    children(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...CommentMetadataFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query comment_createdIssues($id: String, $hash: String, $first: Int, $after: String, $includeArchived: Boolean) {
  comment(id: $id, hash: $hash) {
    id
    createdIssues(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...IssueSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

fragment TopLevelCommentSummaryFields on Comment {
  id
  body
  url
  createdAt
  updatedAt
  editedAt
  resolvedAt
  parentId
  issueId
  projectId
  projectUpdateId
  initiativeId
  initiativeUpdateId
  documentContentId
  user {
    id
    name
    displayName
  }
}

fragment ActorBotSummaryFields on ActorBot {
  id
  type
  subType
  name
  userDisplayName
  avatarUrl
}

fragment CommentMetadataFields on Comment {
  id
  url
  createdAt
  updatedAt
  editedAt
  resolvedAt
  parentId
  issueId
  projectId
  projectUpdateId
  initiativeId
  initiativeUpdateId
  documentContentId
  user {
    id
    name
    displayName
  }
}
