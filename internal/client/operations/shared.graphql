fragment IssueSummaryFields on Issue {
  id
  identifier
  title
  branchName
  url
  priority
  priorityLabel
  team {
    id
    key
    name
  }
  state {
    id
    name
    type
  }
  assignee {
    id
    name
    displayName
  }
  project {
    id
    name
  }
}

fragment CustomerNeedMetadataFields on CustomerNeed {
  id
  createdAt
  updatedAt
  archivedAt
  priority
  url
  customer {
    id
    name
  }
  issue {
    id
    identifier
    title
  }
  project {
    id
    name
  }
}

fragment IssueSharedAccessFields on IssueSharedAccess {
  isShared
  viewerHasOnlySharedAccess
  sharedWithCount
  disallowedIssueFields
}

fragment ProjectSummaryFields on Project {
  id
  name
  description
  slugId
  url
  priority
  status {
    id
    name
    type
  }
  lead {
    id
    name
    displayName
  }
  teams(first: 50) {
    nodes {
      id
      key
      name
    }
  }
}
