query initiativeUpdates($first: Int, $after: String, $includeArchived: Boolean) {
  initiativeUpdates(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...InitiativeUpdateSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query initiativeUpdate($id: String!) {
  initiativeUpdate(id: $id) {
    ...InitiativeUpdateSummaryFields
  }
}

query initiativeUpdate_comments($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  initiativeUpdate(id: $id) {
    id
    comments(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...CommentMetadataFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

fragment InitiativeUpdateSummaryFields on InitiativeUpdate {
  id
  body
  health
  createdAt
  updatedAt
  url
  slugId
  commentCount
  initiative {
    id
    name
  }
  user {
    id
    name
    displayName
  }
}
