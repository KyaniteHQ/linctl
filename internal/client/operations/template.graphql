query templates {
  templates {
    ...TemplateSummaryFields
  }
}

query organization_templates($first: Int, $after: String, $includeArchived: Boolean) {
  organization {
    templates(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...TemplateSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query template($id: String!) {
  template(id: $id) {
    ...TemplateSummaryFields
  }
}

query templateContent($id: String!) {
  template(id: $id) {
    id
    name
    templateData
  }
}

fragment TemplateSummaryFields on Template {
  id
  name
  type
  description
  icon
  color
  sortOrder
  lastAppliedAt
  createdAt
  updatedAt
  archivedAt
  team {
    id
    key
    name
  }
  pipeline {
    id
  }
  creator {
    id
  }
  lastUpdatedBy {
    id
  }
  inheritedFrom {
    id
  }
}
