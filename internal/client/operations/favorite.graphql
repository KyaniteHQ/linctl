query favorites($first: Int, $after: String, $includeArchived: Boolean) {
  favorites(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      ...FavoriteSummaryFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query favorite($id: String!) {
  favorite(id: $id) {
    ...FavoriteSummaryFields
  }
}

query favorite_children($id: String!, $first: Int, $after: String, $includeArchived: Boolean) {
  favorite(id: $id) {
    children(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...FavoriteSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

fragment FavoriteSummaryFields on Favorite {
  id
  type
  folderName
  url
}
