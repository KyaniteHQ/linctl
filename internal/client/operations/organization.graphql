query organization_labels($first: Int, $after: String, $includeArchived: Boolean) {
  organization {
    labels(first: $first, after: $after, includeArchived: $includeArchived) {
      nodes {
        ...IssueLabelSummaryFields
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

