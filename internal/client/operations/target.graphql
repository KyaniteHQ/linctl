query Viewer {
  viewer {
    id
    name
    displayName
    email
    organization {
      id
      name
      urlKey
    }
  }
}

query Organization {
  organization {
    id
    name
    urlKey
  }
}

query organizationExists($urlKey: String!) {
  organizationExists(urlKey: $urlKey) {
    success
    exists
  }
}

query Teams($first: Int, $after: String, $includeArchived: Boolean) {
  teams(first: $first, after: $after, includeArchived: $includeArchived) {
    nodes {
      id
      key
      name
      organization {
        id
        name
        urlKey
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query TargetProject($id: String!, $first: Int, $after: String) {
  project(id: $id) {
    id
    name
    teams(first: $first, after: $after) {
      nodes {
        id
        key
        name
        organization {
          id
          name
          urlKey
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}
